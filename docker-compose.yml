services:
  postgres:
    image: postgres:15
    container_name: contact_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: contact_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: contact_redis
    ports:
      - "6380:6379"

  worker:
    build: .
    container_name: celery_worker
    command: celery -A app.workers.tasks worker --loglevel=info
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6380/0

volumes:
  postgres_data:
